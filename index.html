<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Iago da Silva Cruz">
  <title>Product Card - Atividade 37</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
</head>
<body>

  <div class="product-card">
    <div class="main-images">
      <img id="blue" class="blue active" src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&q=80" alt="Sapatilha de Corrida">
    </div>
    <div class="shoe-details">
      <span class="shoe_name">Nike Air Max</span>
      <p>Sapatilha de alta performance para corrida e treino diário, com amortecimento máximo.</p>
      <div class="stars">
        <i class='fas fa-star'></i>
        <i class='fas fa-star'></i>
        <i class='fas fa-star'></i>
        <i class='fas fa-star'></i>
        <i class='fas fa-star-half-alt'></i>
      </div>
    </div>
    <div class="color-price">
      <div class="color-option">
        <span class="color">Cor:</span>
        <div class="circles">
          <span class="circle blue active"></span>
          <span class="circle pink"></span>
          <span class="circle yellow"></span>
        </div>
      </div>
      <div class="price">
        <span class="price_num">R$ 599</span>
        <span class="price_letter">Nove reais</span>
      </div>
    </div>
    <div class="button">
      <div class="button-layer"></div>
      <button>Adicionar ao Carrinho</button>
    </div>
  </div>

</body>
</html>
